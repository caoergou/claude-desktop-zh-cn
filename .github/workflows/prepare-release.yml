name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.1.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must look like 1.1.4"
            exit 1
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Update release metadata
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("resources/release.json")
          if path.exists():
              data = json.loads(path.read_text(encoding="utf-8"))
          else:
              path.parent.mkdir(parents=True, exist_ok=True)
              data = {"repo": "javaht/claude-desktop-zh-cn"}
          data["repo"] = "javaht/claude-desktop-zh-cn"
          data["release"] = version
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          VERSION: ${{ inputs.version }}

      - name: Validate scripts
        run: |
          bash -n install-mac.command
          git diff --check

      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resources/release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit"
          else
            git commit -m "Release $VERSION"
            git push origin main
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

  build-and-release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Build macOS installer archive
        run: |
          mkdir -p "dist/claude-desktop-zh-cn-mac"
          cp -r install-mac.command scripts resources README.md "dist/claude-desktop-zh-cn-mac/"
          cd dist
          zip -r "claude-desktop-zh-cn-mac.zip" "claude-desktop-zh-cn-mac"

      - name: Build Windows installer archive
        run: |
          mkdir -p "dist/claude-desktop-zh-cn-windows"
          cp -r install-windows.bat scripts resources README.md "dist/claude-desktop-zh-cn-windows/"
          cd dist
          zip -r "claude-desktop-zh-cn-windows.zip" "claude-desktop-zh-cn-windows"

      - name: Stage standalone one-liner scripts
        run: |
          cp scripts/install-mac-curl.sh dist/install-mac-curl.sh
          cp scripts/install-windows-curl.bat dist/install-windows-curl.bat

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            ## 快速安装

            ### macOS
            ```bash
            curl -fsSL https://raw.githubusercontent.com/javaht/claude-desktop-zh-cn/main/scripts/install-mac-curl.sh | bash
            ```

            ### Windows
            1. 右键保存 `scripts/install-windows-curl.bat` 到本地。
            2. 右键该文件，选择“以管理员身份运行”。

            或在 cmd / Win + R 中执行：
            ```cmd
            powershell -ExecutionPolicy Bypass -Command "irm https://raw.githubusercontent.com/javaht/claude-desktop-zh-cn/main/scripts/install-windows-curl.ps1 | iex"
            ```

            ## 手动下载（最直观）
            - `install-mac-curl.sh`：macOS 一键安装脚本
            - `install-windows-curl.bat`：Windows 一键安装脚本（右键管理员运行）

            ## 完整安装包
            - `claude-desktop-zh-cn-mac.zip`：下载后双击 `install-mac.command`
            - `claude-desktop-zh-cn-windows.zip`：下载后右键管理员运行 `install-windows.bat`

            ## 免责声明
            本项目为非官方中文补丁，仅修改本机 Claude Desktop 的本地资源文件。Claude Desktop 更新后资源结构可能变化，若补丁失败，请先更新本项目或重新运行安装脚本。
          files: |
            dist/claude-desktop-zh-cn-mac.zip
            dist/claude-desktop-zh-cn-windows.zip
            dist/install-mac-curl.sh
            dist/install-windows-curl.bat
          fail_on_unmatched_files: true
